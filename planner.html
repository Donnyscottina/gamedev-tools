<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTD Matrix</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0f1014;
  --surface:#181a22;
  --surface2:#1f2230;
  --border:#2c2f3c;
  --border2:#383c4f;
  --text:#f3f4f7;
  --muted:#7a7f95;

  --do:#ff453a;
  --schedule:#0a84ff;
  --delegate:#ff9f0a;
  --eliminate:#30d158;

  --font-head:'Unbounded',sans-serif;
  --font-body:'Noto Sans',sans-serif;
}.custom-checkbox {
  width: 18px;
  height: 18px;
  border: 2px solid var(--muted);
  border-radius: 4px;
  cursor: pointer;
  display: inline-block;
  transition: 0.2s;
  box-sizing: border-box;
}
.custom-checkbox:hover {
  border-color: var(--schedule);
  background: rgba(10,132,255,0.2);
}
.tabs {
  display: flex;
  gap: 8px;
}
.tab-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  transition: 0.2s;
}
.tab-btn.active {
  background: var(--schedule);
  border-color: var(--schedule);
  color: white;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font-body);
  color:var(--text);
  display:grid;
  grid-template-columns:320px 1fr;
  grid-template-rows:60px 1fr;
  background: radial-gradient(1200px 600px at 80% -200px, rgba(10,132,255,.07), transparent 60%), var(--bg);
}

/* HEADER */
header{
  grid-column:1/-1;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 24px;
  background:rgba(24,26,34,.9);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.logo{
  font-family:var(--font-head);
  font-weight:900;
  letter-spacing:2px;
}
.logo em{color:var(--do);font-style:normal}
.top-actions{
  display:flex;
  gap:10px;
}
.top-actions button{
  background:var(--surface2);
  border:1px solid var(--border2);
  color:var(--text);
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}
.top-actions button:hover{
  background:#24273a;
}

/* INBOX */
.inbox-panel{
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
}
.inbox-header{
  padding:18px;
  border-bottom:1px solid var(--border);
}
.inbox-title{
  font-family:var(--font-head);
  font-size:18px;
  display:flex;
  justify-content:space-between;
}
.capture-area{padding:16px;border-bottom:1px solid var(--border)}
.capture-area textarea{
  width:100%;
  height:70px;
  resize:none;
  background:var(--surface2);
  border:1px solid var(--border2);
  color:var(--text);
  border-radius:6px;
  padding:8px;
  outline:none;
}
.capture-area textarea:focus{
  border-color:var(--schedule);
}
.add-btn{
  width:100%;
  margin-top:8px;
  padding:8px;
  border:none;
  border-radius:6px;
  background:linear-gradient(90deg,#fff,#ddd);
  font-family:var(--font-head);
  font-size:10px;
  cursor:pointer;
}
.inbox-list{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* CARD */
.card{
  background:linear-gradient(180deg,#262a3d,#1e2130);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:10px 28px 10px 12px;
  font-size:13px;
  position:relative;
  cursor:grab;
  transition:.15s;
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(0,0,0,.4);
}
.card[data-zone="do"]{border-left:3px solid var(--do)}
.card[data-zone="schedule"]{border-left:3px solid var(--schedule)}
.card[data-zone="delegate"]{border-left:3px solid var(--delegate)}
.card[data-zone="eliminate"]{border-left:3px solid var(--eliminate)}
.card-del{
  position:absolute;
  right:8px;
  top:6px;
  cursor:pointer;
  font-size:12px;
  opacity:0;
}
.card:hover .card-del{opacity:1}
.empty{
  color:var(--muted);
  font-size:12px;
  text-align:center;
  padding:20px 0;
}

/* MATRIX */
.matrix-area{display:flex;flex-direction:column}
.matrix-grid{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
}
.quad{
  padding:18px;
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:auto;
  transition:.15s;
}
.quad.dragover{
  background:rgba(255,255,255,.05);
}
.q-head{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-family:var(--font-head);
  font-size:12px;
}
</style>
</head>
<body>

<header>
  <div class="logo">GTD<em>.</em>Matrix</div>
  <div class="top-actions">
    <button onclick="exportJSON()">Экспорт</button>
    <button onclick="document.getElementById('importFile').click()">Импорт</button>
    <input type="file" id="importFile" hidden accept=".json" onchange="importJSON(event)">
  </div>
</header>

<div class="inbox-panel">
 <div class="inbox-header">
  <div class="top-actions">
    <button class="tab-btn active" id="tab-inbox">Inbox</button>
    <button class="tab-btn" id="tab-completed">Completed</button>
    <span id="inbox-count">0</span>
  </div>
  
</div>
  <div class="capture-area">
    <textarea id="captureInput" placeholder="Новая задача... (Ctrl+Enter)"></textarea>
    <button class="add-btn" onclick="capture()">Добавить</button>
  </div>
  <div class="inbox-list" id="inbox"></div>
</div>

<div class="matrix-area">
  <div class="matrix-grid">
    <div class="quad" data-zone="do"><div class="q-head">Сделать/важно <span id="count-do"></span></div><div id="do"></div></div>
    <div class="quad" data-zone="schedule"><div class="q-head">Запланировать <span id="count-schedule"></span></div><div id="schedule"></div></div>
    <div class="quad" data-zone="delegate"><div class="q-head">Сделать, но не срочно <span id="count-delegate"></span></div><div id="delegate"></div></div>
    <div class="quad" data-zone="eliminate"><div class="q-head">Не срочно/не важно <span id="count-eliminate"></span></div><div id="eliminate"></div></div>
  </div>
</div>

<script>
const STORAGE_KEY = "gtd_matrix_v6";

let state = loadState();
let activeTab = 'inbox'; // 'inbox' или 'completed'
document.getElementById('tab-inbox').addEventListener('click', () => {
  activeTab = 'inbox';
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('tab-inbox').classList.add('active');
  render();
});

document.getElementById('tab-completed').addEventListener('click', () => {
  activeTab = 'completed';
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('tab-completed').classList.add('active');
  render();
});
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return {version:1,tasks:[]};
    return JSON.parse(raw);
  }catch(e){
    alert("Ошибка загрузки данных");
    return {version:1,tasks:[]};
  }
}

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state,null,2));
}

function uid(){
  return Date.now()+"_"+Math.random().toString(36).slice(2,6);
}

function capture(){
  const input=document.getElementById("captureInput");
  const text=input.value.trim();
  if(!text)return;
  state.tasks.unshift({id:uid(),text,zone:"inbox"});
  input.value="";
  save();
  render();
}

document.getElementById("captureInput").addEventListener("keydown",e=>{
  if(e.ctrlKey && e.key==="Enter") capture();
});

function deleteTask(id){
  if(!confirm("Удалить задачу?")) return;
  state.tasks=state.tasks.filter(t=>t.id!==id);
  save();render();
}

function editTask(id){
  const task=state.tasks.find(t=>t.id===id);
  const text=prompt("Редактировать:",task.text);
  if(text!==null){
    task.text=text.trim();
    save();render();
  }
}

function makeCard(task) {
  const div = document.createElement("div");
  div.className = "card";
  div.dataset.zone = task.zone;
  div.draggable = true;

  const contentDiv = document.createElement("div");
  contentDiv.style.display = "flex";
  contentDiv.style.alignItems = "center";
  contentDiv.style.gap = "8px";

  // Кастомный чекбокс (только если задача не выполнена)
  if (task.zone !== 'completed') {
    const checkBox = document.createElement("span");
    checkBox.className = "custom-checkbox";
    checkBox.onclick = (e) => {
      e.stopPropagation();
      completeTask(task.id);
    };
    contentDiv.appendChild(checkBox);
  }

  const textSpan = document.createElement("span");
  textSpan.textContent = task.text;
  textSpan.style.flex = "1";
  contentDiv.appendChild(textSpan);

  const delSpan = document.createElement("span");
  delSpan.className = "card-del";
  delSpan.innerHTML = "✕";
  delSpan.onclick = (e) => {
    e.stopPropagation();
    deleteTask(task.id);
  };
  contentDiv.appendChild(delSpan);

  div.appendChild(contentDiv);
  div.ondblclick = () => editTask(task.id);
  div.ondragstart = e => e.dataTransfer.setData("id", task.id);

  return div;
}
  // Текст задачи
 function completeTask(id) {
  const task = state.tasks.find(t => t.id === id);
  if (task) {
    task.zone = 'completed';
    save();
    render();
  }
}

function render() {
  const zones = ["do", "schedule", "delegate", "eliminate"];
  zones.forEach(z => {
    const el = document.getElementById(z);
    if (!el) return;
    el.innerHTML = "";
    const tasks = state.tasks.filter(t => t.zone === z);
    if (!tasks.length) el.innerHTML = "<div class='empty'>Пусто</div>";
    tasks.forEach(t => el.appendChild(makeCard(t)));
    document.getElementById("count-" + z).textContent = tasks.length;
  });

  // Отрисовка левой панели в зависимости от activeTab
  const inboxEl = document.getElementById("inbox");
  inboxEl.innerHTML = "";
  let tasksToShow = [];
  if (activeTab === 'inbox') {
    tasksToShow = state.tasks.filter(t => t.zone === 'inbox');
  } else {
    tasksToShow = state.tasks.filter(t => t.zone === 'completed');
  }

  if (tasksToShow.length === 0) {
    inboxEl.innerHTML = "<div class='empty'>Пусто</div>";
  } else {
    tasksToShow.forEach(t => inboxEl.appendChild(makeCard(t)));
  }

  // Обновляем счётчик в левой панели (показываем количество в активной вкладке)
  document.getElementById("inbox-count").textContent = tasksToShow.length;
}

document.addEventListener("dragover",e=>e.preventDefault());
document.addEventListener("drop",e=>{
  const id=e.dataTransfer.getData("id");
  const zone=e.target.closest(".quad");
  if(!zone)return;
  const task=state.tasks.find(t=>t.id===id);
  if(task){
    task.zone=zone.dataset.zone;
    save();render();
  }
});

function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="gtd-matrix.json";
  a.click();
}

function importJSON(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(evt){
    try{
      state=JSON.parse(evt.target.result);
      save();render();
    }catch{
      alert("Некорректный JSON файл");
    }
  };
  reader.readAsText(file);
}

render();
</script>

</body>
</html>
